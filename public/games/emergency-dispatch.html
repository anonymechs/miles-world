<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Dispatch</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeedea;
    --bg-info: #e6f1fb;
    --bg-success: #e1f5ee;
    --bg-danger: #fcebeb;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --text-info: #185fa5;
    --text-success: #0f6e56;
    --text-danger: #a32d2d;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a28;
      --bg3: #323230;
      --bg-info: #042c53;
      --bg-success: #04342c;
      --bg-danger: #501313;
      --text: #f0ede8;
      --text2: #b4b2a9;
      --text3: #888780;
      --text-info: #85b7eb;
      --text-success: #5dcaa5;
      --text-danger: #f09595;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
    }
  }

  body {
    background: var(--bg3);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    color: var(--text);
  }

  h1 {
    font-size: 20px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 12px;
    color: var(--text);
    letter-spacing: -.3px;
  }

  #game {
    width: 100%;
    max-width: 680px;
  }

  /* HUD */
  #hud {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .hud-box {
    flex: 1;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    text-align: center;
  }

  .hud-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .6px;
  }

  .hud-val {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
  }

  #timer.urgent .hud-val { color: var(--text-danger); }

  /* Stations */
  #stations {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }

  .station {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 8px 4px;
    text-align: center;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .station-key {
    font-size: 9px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: .4px;
    margin-bottom: 2px;
  }

  .station-icon { font-size: 30px; line-height: 1.2; }
  .station-name { font-size: 10px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }

  .station-fire   { border-color: #e24b4a; background: linear-gradient(180deg, rgba(252,235,235,.6) 0%, var(--bg) 70%); }
  .station-hospital{ border-color: #1d9e75; background: linear-gradient(180deg, rgba(225,245,238,.6) 0%, var(--bg) 70%); }
  .station-police { border-color: #378add; background: linear-gradient(180deg, rgba(230,241,251,.6) 0%, var(--bg) 70%); }
  .station-helipad{ border-color: #ba7517; background: linear-gradient(180deg, rgba(250,238,218,.6) 0%, var(--bg) 70%); }

  .bay {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    justify-content: center;
    align-items: flex-start;
    padding: 2px;
    width: 100%;
  }

  .bay-vehicle {
    font-size: 16px;
    line-height: 1;
    animation: pop .25s ease;
  }

  @keyframes pop {
    0%   { transform: scale(0) rotate(-10deg); }
    70%  { transform: scale(1.25) rotate(3deg); }
    100% { transform: scale(1) rotate(0); }
  }

  /* Conveyor */
  #conveyor-wrap {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  #conveyor-label {
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  #conveyor {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    overflow: hidden;
    min-height: 72px;
  }

  .belt-sep {
    color: var(--text3);
    font-size: 12px;
    padding-bottom: 10px;
    flex-shrink: 0;
  }

  .vehicle-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }

  .next-badge {
    font-size: 8px;
    font-weight: 500;
    background: var(--bg-info);
    color: var(--text-info);
    padding: 2px 5px;
    border-radius: 4px;
    letter-spacing: .3px;
  }

  .slot-icon { font-size: 30px; line-height: 1; }
  .vehicle-slot.is-next .slot-icon { font-size: 38px; }
  .slot-tag { font-size: 9px; color: var(--text3); }
  .vehicle-slot.is-next .slot-tag { color: var(--text2); font-weight: 500; }

  /* Controls */
  #controls {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }

  .ctrl-btn {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-md);
    padding: 10px 4px 8px;
    text-align: center;
    cursor: pointer;
    transition: background .1s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:hover { background: var(--bg2); }
  .ctrl-btn:active { background: var(--bg3); transform: scale(.97); }

  .ctrl-arrow { font-size: 16px; color: var(--text2); }
  .ctrl-veh   { font-size: 18px; margin: 2px 0; }
  .ctrl-label { font-size: 9px; color: var(--text3); }

  /* Feedback */
  #feedback {
    height: 26px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    transition: opacity .3s;
  }

  #feedback.right { color: var(--text-success); }
  #feedback.wrong { color: var(--text-danger); }

  /* Bottom */
  #bottom {
    display: flex;
    justify-content: center;
    margin-top: 4px;
  }

  #reset-btn {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-md);
    padding: 8px 24px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    transition: background .1s;
  }

  #reset-btn:hover { background: var(--bg2); }

  /* Overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }

  #overlay.show { display: flex; }

  #modal {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 20px 20px;
    width: min(380px, 100%);
    max-height: 85vh;
    overflow-y: auto;
  }

  #modal h2 {
    font-size: 18px;
    font-weight: 500;
    text-align: center;
    color: var(--text);
    margin-bottom: 4px;
  }

  .score-big {
    font-size: 56px;
    font-weight: 500;
    text-align: center;
    color: var(--text);
    line-height: 1.1;
    margin: 6px 0 2px;
  }

  .score-sub {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 20px;
  }

  .hs-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 18px;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 6px 8px;
    font-weight: 500;
    font-size: 11px;
    color: var(--text3);
    border-bottom: 0.5px solid var(--border);
  }

  td {
    padding: 7px 8px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text);
  }

  tr.me td { color: var(--text-success); font-weight: 500; }

  #play-again {
    display: block;
    width: 100%;
    padding: 11px;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    transition: background .1s;
  }

  #play-again:hover { background: var(--bg2); }

  /* Responsive */
  @media (max-width: 420px) {
    #stations { grid-template-columns: repeat(2, 1fr); }
    .station { min-height: 100px; }
    .hud-val { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="game">
  <h1>🚨 Emergency Dispatch</h1>

  <div id="hud">
    <div class="hud-box" id="timer">
      <div class="hud-label">Time</div>
      <div class="hud-val" id="timer-val">60</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="score-val">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Streak</div>
      <div class="hud-val" id="streak-val">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Best</div>
      <div class="hud-val" id="best-val">0</div>
    </div>
  </div>

  <div id="stations">
    <div class="station station-fire">
      <div class="station-key">◀ LEFT</div>
      <div class="station-icon">🚒</div>
      <div class="station-name">Fire Station</div>
      <div class="bay" id="bay-fire"></div>
    </div>
    <div class="station station-hospital">
      <div class="station-key">▼ DOWN</div>
      <div class="station-icon">🏥</div>
      <div class="station-name">Hospital</div>
      <div class="bay" id="bay-hospital"></div>
    </div>
    <div class="station station-police">
      <div class="station-key">▶ RIGHT</div>
      <div class="station-icon">🚓</div>
      <div class="station-name">Police Station</div>
      <div class="bay" id="bay-police"></div>
    </div>
    <div class="station station-helipad">
      <div class="station-key">▲ UP</div>
      <div class="station-icon">🚁</div>
      <div class="station-name">Helipad</div>
      <div class="bay" id="bay-helipad"></div>
    </div>
  </div>

  <div id="conveyor-wrap">
    <div id="conveyor-label">Conveyor Belt — dispatch the first vehicle with the correct arrow key</div>
    <div id="conveyor"></div>
  </div>

  <div id="controls">
    <div class="ctrl-btn" onclick="dispatch('left')">
      <div class="ctrl-arrow">◀</div>
      <div class="ctrl-veh">🚒</div>
      <div class="ctrl-label">Fire Truck</div>
    </div>
    <div class="ctrl-btn" onclick="dispatch('down')">
      <div class="ctrl-arrow">▼</div>
      <div class="ctrl-veh">🚑</div>
      <div class="ctrl-label">Ambulance</div>
    </div>
    <div class="ctrl-btn" onclick="dispatch('right')">
      <div class="ctrl-arrow">▶</div>
      <div class="ctrl-veh">🚔</div>
      <div class="ctrl-label">Police Car</div>
    </div>
    <div class="ctrl-btn" onclick="dispatch('up')">
      <div class="ctrl-arrow">▲</div>
      <div class="ctrl-veh">🚁</div>
      <div class="ctrl-label">Helicopter</div>
    </div>
  </div>

  <div id="feedback"></div>

  <div id="bottom">
    <button id="reset-btn" onclick="resetGame()">Reset</button>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <div id="modal-body"></div>
    <button id="play-again" onclick="resetGame()">Play again</button>
  </div>
</div>

<script>
const VEHICLES = [
  { id: 'fire',      icon: '🚒', label: 'Fire Truck',  key: 'left',  bay: 'bay-fire'     },
  { id: 'ambulance', icon: '🚑', label: 'Ambulance',   key: 'down',  bay: 'bay-hospital'  },
  { id: 'police',    icon: '🚔', label: 'Police Car',  key: 'right', bay: 'bay-police'    },
  { id: 'heli',      icon: '🚁', label: 'Helicopter',  key: 'up',    bay: 'bay-helipad'   },
];

const BELT_SIZE = 9;
let belt = [], score = 0, streak = 0, timeLeft = 60, timerId = null, running = false;
let highScores = [];

try { highScores = JSON.parse(localStorage.getItem('ed_hs') || '[]'); } catch(e) { highScores = []; }

function pick() { return VEHICLES[Math.floor(Math.random() * VEHICLES.length)]; }

function fillBelt() {
  while (belt.length < BELT_SIZE) belt.push(pick());
}

function renderBelt() {
  const c = document.getElementById('conveyor');
  c.innerHTML = '';
  belt.slice(0, BELT_SIZE).forEach((v, i) => {
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'belt-sep';
      sep.textContent = '›';
      c.appendChild(sep);
    }
    const slot = document.createElement('div');
    slot.className = 'vehicle-slot' + (i === 0 ? ' is-next' : '');

    if (i === 0) {
      const badge = document.createElement('div');
      badge.className = 'next-badge';
      badge.textContent = 'NEXT';
      slot.appendChild(badge);
    }

    const icon = document.createElement('div');
    icon.className = 'slot-icon';
    icon.textContent = v.icon;

    const tag = document.createElement('div');
    tag.className = 'slot-tag';
    tag.textContent = v.label;

    slot.appendChild(icon);
    slot.appendChild(tag);
    c.appendChild(slot);
  });
}

function renderHUD() {
  document.getElementById('score-val').textContent = score;
  const streakEl = document.getElementById('streak-val');
  streakEl.textContent = streak >= 3 ? streak + '🔥' : streak;
  const best = highScores.length ? highScores[0].score : 0;
  document.getElementById('best-val').textContent = Math.max(best, score);
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.textContent = ''; el.className = ''; }, 1100);
}

function addToBay(bayId, icon) {
  const bay = document.getElementById(bayId);
  const el = document.createElement('div');
  el.className = 'bay-vehicle';
  el.textContent = icon;
  bay.appendChild(el);
  if (bay.children.length > 8) bay.removeChild(bay.firstChild);
}

function dispatch(key) {
  if (!running || belt.length === 0) return;
  const next = belt[0];
  if (next.key === key) {
    belt.shift();
    fillBelt();
    score++;
    streak++;
    const bonus = streak >= 5 ? 2 : streak >= 3 ? 1 : 0;
    score += bonus;
    if (bonus > 0) showFeedback('Streak bonus +' + (1 + bonus) + '! 🔥', 'right');
    else showFeedback('Dispatched! ✓', 'right');
    addToBay(next.bay, next.icon);
  } else {
    streak = 0;
    score = Math.max(0, score - 1);
    showFeedback('Wrong station! –1', 'wrong');
  }
  renderHUD();
  renderBelt();
}

function tick() {
  timeLeft--;
  document.getElementById('timer-val').textContent = timeLeft;
  if (timeLeft <= 10) document.getElementById('timer').classList.add('urgent');
  if (timeLeft <= 0) {
    clearInterval(timerId);
    running = false;
    endGame();
  }
}

function endGame() {
  const entry = { score, date: new Date().toLocaleDateString() };
  highScores.push(entry);
  highScores.sort((a, b) => b.score - a.score);
  if (highScores.length > 10) highScores = highScores.slice(0, 10);
  try { localStorage.setItem('ed_hs', JSON.stringify(highScores)); } catch(e) {}

  const medals = ['🥇','🥈','🥉'];

  let html = `<h2>Time's up!</h2>`;
  html += `<div class="score-big">${score}</div>`;
  html += `<div class="score-sub">vehicles dispatched correctly</div>`;
  html += `<div class="hs-title">High Scores</div>`;
  html += `<table><thead><tr><th>#</th><th>Score</th><th>Date</th></tr></thead><tbody>`;
  highScores.forEach((e, i) => {
    const cls = e === entry ? ' class="me"' : '';
    const rank = medals[i] || (i + 1);
    html += `<tr${cls}><td>${rank}</td><td>${e.score}</td><td>${e.date}</td></tr>`;
  });
  html += `</tbody></table>`;

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

function resetGame() {
  clearInterval(timerId);
  score = 0; streak = 0; timeLeft = 60; running = true;
  belt = []; fillBelt();
  ['bay-fire','bay-hospital','bay-police','bay-helipad'].forEach(id => {
    document.getElementById(id).innerHTML = '';
  });
  document.getElementById('timer-val').textContent = 60;
  document.getElementById('timer').classList.remove('urgent');
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('overlay').classList.remove('show');
  renderHUD();
  renderBelt();
  timerId = setInterval(tick, 1000);
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
  if (map[e.key]) { e.preventDefault(); dispatch(map[e.key]); }
});

resetGame();
</script>
</body>
</html>
